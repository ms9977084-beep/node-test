<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>따뜻한 키오스크 AAC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="main-page">
        <h1>환영합니다!</h1>
        <p>아래 버튼을 누르면 메뉴판이 나옵니다.</p>
        <button id="view-menu">메뉴판 보기</button>
    </main>

    <div id="menu" class="hidden">
        <h2>메뉴를 선택하세요</h2>
        <div id="menu-list"></div>
    </div>

    <script src="script.js"></script>
    <div id="detail-view" class="hidden">
    <button id="close-detail">X 닫기</button>
    <div id="detail-content">
        <p id="detail-desc"></p>
        <img id="detail-price-img" src="" alt="가격 이미지" style="max-width: 100%; height: auto; border-radius: 10px;">
    </div>
</div>

</body>
</html>
